<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Refusé - 225 E-SPORTS LEAGUE</title>
    <link rel="stylesheet" href="modern-design.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff7700 0%, #e66a00 100%);
        }
        
        .error-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }
        
        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .error-container h1 {
            font-size: 36px;
            color: #ff7700;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        
        .error-container p {
            font-size: 18px;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .error-container a {
            display: inline-block;
            background-color: #ff7700;
            color: #fff;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .error-container a:hover {
            background-color: #e66a00;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">🚫</div>
        <h1>Accès Refusé</h1>
        <p>Vous devez accepter le règlement intérieur pour accéder au site de la <strong>225 E-SPORTS LEAGUE</strong>.</p>
        <p>Si vous changez d'avis, vous pouvez revenir et accepter les conditions.</p>
        <a href="index.html">Retour à l'accueil</a>
    </div>
</body>
</html>
